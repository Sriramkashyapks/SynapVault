version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: synapvault_db
    restart: always
    environment:
      POSTGRES_USER: synapuser
      POSTGRES_PASSWORD: synappassword
      POSTGRES_DB: synapvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: synapvault_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
